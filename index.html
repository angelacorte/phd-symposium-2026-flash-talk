<script>
    document.querySelectorAll('video[data-start][data-end]').forEach((video) => {
        const start = Number(video.dataset.start);
        const end = Number(video.dataset.end);

        video.addEventListener('loadedmetadata', () => {
            if (Number.isFinite(start)) {
                video.currentTime = start;
            }
            video.play().catch(() => {});
        });

        video.addEventListener('timeupdate', () => {
            if (Number.isFinite(start) && Number.isFinite(end) && video.currentTime >= end) {
                video.currentTime = start;
                video.play();
            }
        });
    });
</script>
